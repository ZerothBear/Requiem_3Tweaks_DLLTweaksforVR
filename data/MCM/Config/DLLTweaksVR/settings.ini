; This file contains DLLTweaksVR setting defaults.
; Do not modify this file directly.
; To make persistent user changes outside the MCM, copy values into Data\MCM\Settings\DLLTweaksVR.ini.

[Fixes]
; Starting the game as a Nord no longer breaks intended mechanics.
bNordRaceStats = 0

; Player movement speed no longer scales with race height.
bScaleMovementSpeed = 1

[Tweaks]
; Spell absorption chance is capped to the configured maximum.
bAbsorptionChance = 1
fAbsorptionChanceCap = 75.0

; Concentration spells that cost more than the actor's total magicka amount can no longer be cast.
bConcentrationCasting = 1

; Jump height is reduced while sneaking by the configured modifier.
bSneakJumpHeight = 0
fSneakJumpModifier = 0.55

[Debug]
; Enables verbose native startup diagnostics and runtime hook trace logging.
bDebugging = 0
